<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Color Scheme Switcher</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="buttons">
            <button>Home</button>
            <a class="btn" href="https://upskill.tutedude.com/course/lecture-mernstack" target="_blank">
                Youtube Channel
            </a>
        </div>

        <h2>Color Scheme Switcher</h2>

        <div class="color-boxes">
            <div class="box" id="gray"></div>
            <div class="box" id="white"></div>
            <div class="box" id="blue"></div>
            <div class="box" id="yellow"></div>
        </div>


        <p>
            Try clicking on one of the colors above <br>
            to change the background color of this page!
        </p>
    </div>
    <script src="script.js"></script>

</body>

</html>
